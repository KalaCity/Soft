<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神书软件工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部卡片 */
        .header {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 80px;
            height: 80px;
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        /* 图片logo样式覆盖 - 移除渐变背景，让图片完整显示 */
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        /* 如果图片加载失败，保留渐变背景和备用emoji样式 */
        .logo:has(img:only-child) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        /* 软件列表 */
        .software-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 单个软件卡片 */
        .software-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .software-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        /* 软件信息区域 */
        .software-info {
            flex: 1;
        }

        .software-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .software-icon {
            font-size: 28px;
        }

        .version {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }

        .software-desc {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .file-info {
            font-size: 12px;
            color: #999;
        }

        /* 下载按钮 */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .software-card {
                flex-direction: column;
                text-align: center;
            }
            
            .software-info {
                text-align: center;
            }
            
            .software-name {
                justify-content: center;
            }
            
            .download-btn {
                width: 100%;
                justify-content: center;
            }
            
            .header {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部： 图片 -->
        <div class="header">
            <div class="logo">
           
                <img src="png/studioLogo.png" alt="神书工作室Logo" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<span>📱</span>';">
            </div>
            <h1>神书工作室</h1>
            <p class="subtitle">专业软件 · 用心出品</p>
        </div>

        <!-- 软件列表 -->
        <div class="software-list">
            <!-- 软件1 -->
            <div class="software-card">
                <div class="software-info">
                    <div class="software-name">
                        <span class="software-icon">📱</span>
                        老年人能力评估
                        <span class="version">v1.0</span>
                    </div>
                    <div class="software-desc">根据GB/T 42195—2022标准，快捷评估老年人能力</div>
                    <div class="file-info">大小: 10 MB | 更新: 2025-04-02</div>
                </div>
                <a href="apk/Elderly_Ability_Assessment_1.0_release.apk" class="download-btn" download>
                     安卓下载
                </a>

                <a href="https://apps.apple.com/cn/app/老人能力评估/id1623127979" class="download-btn" >
                     苹果下载
                </a>
            </div>

            <!-- 软件2  -->
           

            
        </div>

        <div class="footer">
            <p>© 2024 神书软件工作室</p>
            <p style="font-size: 12px; margin-top: 8px;">Android 10.0 及以上版本支持 | 安装前请允许"未知来源"安装权限</p>
        </div>
    </div>
</body>
</html>
