<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作室软件下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .version {
            background: #f0f0f0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            margin-bottom: 24px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 32px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .info {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
        }

        .info h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
        }

        .info ul {
            list-style: none;
        }

        .info li {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .info li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            
            .download-btn {
                padding: 14px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span>📱</span>
        </div>
        <h1>工作室名称</h1>
        <p class="subtitle">专业软件 · 用心出品</p>
        <div class="version">版本 v1.0.0 | 大小 25.6 MB</div>
        
        <a href="app.apk" class="download-btn" download>
            📥 立即下载 APK
        </a>
        
        <div class="info">
            <h3>📋 软件说明</h3>
            <ul>
                <li>支持 Android 7.0 及以上系统</li>
                <li>安装前请允许"未知来源"安装权限</li>
                <li>如遇安装问题，请联系客服</li>
            </ul>
        </div>
        
        <div class="footer">
            © 2024 工作室名称 · 保留所有权利
        </div>
    </div>
</body>
</html>
